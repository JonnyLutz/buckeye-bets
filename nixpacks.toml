[phases.setup]
nixPkgs = ["python311Full", "nodejs_22"]

[phases.install]
cmds = [
  "python3 -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "cd frontend && npm ci"
]

[phases.build]
cmds = ["cd frontend && npm run build"]

[start]
cmd = "/opt/venv/bin/uvicorn backend.api.main:app --host 0.0.0.0 --port ${PORT:-8000}"
